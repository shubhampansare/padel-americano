            ? `<input id="pl-edit" value="${esc(p.name)}" autocomplete="off" enterkeyhint="done">`
            : `<div style="flex:1;min-width:0">
                 <div style="font-weight:600">${esc(p.name)}${p.active ? '' : ' (left)'}</div>
                 <div class="pstat">${Math.round(byId[p.id].points)} ${scoreUnit(T.config)} · ${byId[p.id].played} ${T.config.scoring === 'games' ? 'matches' : 'games'} · ${byId[p.id].rests} rests</div>
               </div>`}
          ${p.id === editPid
            ? `<button class="del" id="pl-save" style="color:var(--lime)">✓</button>`
            : p.active
              ? `${T.config.format === 'americano' && T.config.useSkills ? `<button class="skill-badge sk${p.skill || 2}" data-skp="${p.id}">${SKILL_GLYPH[p.skill || 2]}</button>` : ''}<button class="del" data-ed="${p.id}">✎</button><button class="del" data-rm="${p.id}">✕</button>`
              : `<button class="del" data-rj="${p.id}" style="color:var(--lime);font-size:.9rem;width:auto;padding:0 12px">↩ rejoin</button>`}
        </div>`).join('')}
    </div>
    <div class="player-row" style="margin-top:10px">
      <span class="pnum">+</span>
      <input id="np-name" placeholder="New player name" autocomplete="off">
      <button class="del" id="np-add" style="color:var(--lime);font-size:1.5rem">+</button>
    </div>`);
  ov.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', () => {
    const p = T.players.find(x => x.id === b.dataset.rm);
    confirmSheet(`Remove ${p.name}?`, 'They keep their points and can rejoin later from this list.', 'Remove', () => {
      mutate(() => Engine.removePlayer(T, p.id));
      openPlayersSheet();
    });
  }));
  ov.querySelectorAll('[data-ed]').forEach(b => b.addEventListener('click', () => openPlayersSheet(b.dataset.ed)));
  ov.querySelectorAll('[data-skp]').forEach(b => b.addEventListener('click', () => {
    const p = T.players.find(x => x.id === b.dataset.skp);
    const ns = nextSkill(p.skill || 2);
    mutate(() => Engine.setSkill(T, p.id, ns));
    openPlayersSheet();
  }));
  ov.querySelectorAll('[data-rj]').forEach(b => b.addEventListener('click', () => {
    const p = T.players.find(x => x.id === b.dataset.rj);
    mutate(() => Engine.reactivatePlayer(T, p.id));
    toast(p.name + ' rejoins from the next draw');
    openPlayersSheet();
  }));
  const editInp = ov.querySelector('#pl-edit');
  if (editInp) {
    const commit = () => {
      const v = editInp.value.trim();
      const p = T.players.find(x => x.id === editPid);
      if (v && v !== p.name) mutate(() => Engine.renamePlayer(T, editPid, v));
      openPlayersSheet();
    };
    editInp.focus();
    editInp.select();
    ov.querySelector('#pl-save').addEventListener('click', commit);
    editInp.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') openPlayersSheet(); });
  }
  ov.querySelector('#np-add').addEventListener('click', () => {
    const name = ov.querySelector('#np-name').value.trim();
    if (!name) return;
    if (T.players.some(p => p.name.toLowerCase() === name.toLowerCase())) { toast('Name already in use', true); return; }
    mutate(() => Engine.addPlayer(T, name));
    toast(name + ' joins from the next draw');
    openPlayersSheet();
  });
}

/**
 * After finishing the active round with latecomers still pending, prompt for arrivals before
 * the next round: optional before round 2 (tick people in → that round redraws, or continue),
 * mandatory at the cap before round 3. No-op for a full roster or when editing an earlier round.
 */
function arrivalsCheckpoint(roundIdx, prevIdx) {
  if (!Engine.pendingPlayers(T).length) return;          // full roster — nothing to ask
  if (roundIdx !== prevIdx) return;                       // editing an earlier round, not advancing
  if (!Engine.roundComplete(T, roundIdx)) return;         // round not actually finished yet
  if (roundIdx + 1 >= T.config.plannedRounds) return;     // no further round to play
  if (roundIdx + 1 >= Engine.PARTIAL_ROUND_CAP) openReadinessSheet({ gate: true });
  else openReadinessSheet({ inter: true, nextRoundNo: roundIdx + 2 });
}

/**
 * Readiness sheet — check late arrivals in (or remove no-shows). Modes via opts:
 *  - {inter, nextRoundNo}: before the next round (optional) — tick latecomers in (redraws that
 *    round) or continue with who's here. Auto-shown when a round finishes with people pending.
 *  - {gate}: mandatory before the round past PARTIAL_ROUND_CAP — everyone must be in or removed.
 *  - {redrawIdx}: re-draw that round after confirming who's arrived.
 *  - {} (manage): opened from the banner mid-round; just closes.
 */
function openReadinessSheet(opts) {
  opts = opts || {};
  const pend = Engine.pendingPlayers(T);
  const arrivedN = Engine.activePlayers(T).length;
  const isRedraw = typeof opts.redrawIdx === 'number';
  // gate (mandatory) is passed explicitly so its label/behaviour survive the last check-in
  // (which refills the schedule); inter (optional) is the after-round-1/before-round-2 prompt.
  const gate = !isRedraw && !!opts.gate;
  const inter = !isRedraw && !gate && !!opts.inter;
  const advancing = gate || inter;
  const nextRoundNo = gate ? (Engine.PARTIAL_ROUND_CAP + 1) : (opts.nextRoundNo || currentRoundIdx(T) + 1);
  const ov = sheet(`
    <div class="grab"></div>
    <h3>${pend.length ? 'Who has arrived?' : 'Everyone is here'}</h3>
    <div class="sub">${isRedraw
      ? 'Check in anyone who arrived, then re-draw the round to include them.'
      : gate
        ? (pend.length
          ? `Round ${nextRoundNo} needs the full group — check everyone in, or remove no-shows.`
          : `Everyone's in — continue to round ${nextRoundNo}.`)
        : inter
          ? (pend.length
            ? `Anyone arrived? Tick them in to join round ${nextRoundNo} (it'll be re-drawn), or continue with who's here.`
            : `Everyone's in — continue to round ${nextRoundNo}.`)
          : 'Tick players in as they arrive — they join the draw from the next round.'}</div>
    <div class="proster">
      ${pend.length ? pend.map(p => `
        <div class="player-row">
          <span class="pnum">🕒</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600">${esc(p.name)}</div>
            <div class="pstat">not checked in</div>
          </div>
          <button class="del" data-here="${p.id}" style="color:var(--lime);font-size:.9rem;width:auto;padding:0 12px">✓ here</button>
          <button class="del" data-noshow="${p.id}" title="Remove no-show">✕</button>
        </div>`).join('') : '<div class="setup-note">Everyone entered has checked in.</div>'}
    </div>
    <div class="setup-note" style="margin-top:10px">${arrivedN} checked in${pend.length ? ` · ${pend.length} waiting` : ''}</div>
    <div class="sheet-actions">
      ${isRedraw
        ? `<button class="btn btn-primary" id="rd-go" style="flex:2">⟲ Re-draw round ${opts.redrawIdx + 1}</button>`
        : advancing
          ? `<button class="btn btn-primary" id="rd-continue" style="flex:2" ${gate && pend.length ? 'disabled' : ''}>Continue to round ${nextRoundNo}</button>`
          : `<button class="btn btn-primary" id="rd-done" style="flex:2">Done</button>`}
    </div>`);
  ov.querySelectorAll('[data-here]').forEach(b => b.addEventListener('click', () => {
    const p = T.players.find(x => x.id === b.dataset.here);
    if (mutate(() => Engine.markArrived(T, p.id))) toast(p.name + ' checked in');
    openReadinessSheet(opts);
  }));
  ov.querySelectorAll('[data-noshow]').forEach(b => b.addEventListener('click', () => {
    const p = T.players.find(x => x.id === b.dataset.noshow);
    confirmSheet(`Remove ${p.name}?`, 'They never checked in — this removes them from the tournament entirely.', 'Remove', () => {
      mutate(() => Engine.removeNoShow(T, p.id));
      openReadinessSheet(opts);
    });
  }));
  const go = ov.querySelector('#rd-go');
  if (go) go.addEventListener('click', () => { closeSheet(); mutate(() => { Engine.regenerateRound(T, opts.redrawIdx); viewRound = opts.redrawIdx; }); });
  const advance = () => {
    closeSheet();
    // Mexicano draws lazily — draw the now-unblocked round; Americano already refilled on check-in
    if (T.config.format === 'mexicano' && T.rounds.every((_, i) => Engine.roundComplete(T, i)) && T.rounds.length < T.config.plannedRounds) {
      mutate(() => { Engine.generateRound(T); viewRound = T.rounds.length - 1; });
    } else {
      viewRound = currentRoundIdx(T);
      render();
    }
  };
  const cont = ov.querySelector('#rd-continue');
  if (cont) cont.addEventListener('click', advance);
  const done = ov.querySelector('#rd-done');
  if (done) done.addEventListener('click', advance);
}

  const ov = sheet(`
    <div class="grab"></div>
    <h3>Settings</h3>
    <div class="sub">Changes apply from the next draw — played rounds never change.</div>
    <div class="field-label">Courts <span class="hint">currently using ${Engine.courtsUsed(T)}</span></div>
    <div class="stepper" id="set-courts"><button data-d="-1">−</button><div class="stepper-val">${c.courts}</div><button data-d="1">+</button></div>
    <div class="field-label">Planned rounds</div>
    <div class="stepper" id="set-rounds"><button data-d="-1">−</button><div class="stepper-val">${c.plannedRounds}</div><button data-d="1">+</button></div>
    <div class="field-label">Ranking</div>
    <div class="seg" id="set-ranking">
      <button data-v="points" class="${c.ranking === 'points' ? 'on' : ''}">Total ${unit}</button>
      <button data-v="wins" class="${c.ranking === 'wins' ? 'on' : ''}">Wins first</button>
    </div>
    ${c.format === 'americano' ? `
    <div class="field-label">Balanced draws (skill levels)</div>
    <div class="seg" id="set-skillmode">
      <button data-v="0" class="${!c.useSkills ? 'on' : ''}">Off</button>
      <button data-v="1" class="${c.useSkills ? 'on' : ''}">On</button>
    </div>
    <div class="setup-note">Set each player's badge in Menu → Players (+ stronger · • middle · − weaker). Unplayed rounds are redrawn instantly to avoid lopsided matches.</div>` : ''}
    <div class="field-label">Sit-out compensation</div>
    <div class="seg" id="set-rest">
      <button data-m="none" class="${restMode === 'none' ? 'on' : ''}">None</button>
      <button data-m="half" class="${restMode === 'half' ? 'on' : ''}">+${restVal} fixed</button>
      <button data-m="avg" class="${restMode === 'avg' ? 'on' : ''}">Their avg</button>
    </div>
    <div class="setup-note">Fixed: ${c.scoring === 'games' ? `half the games target (${restVal}) per sit-out` : 'half the match total per sit-out'} — neutral for everyone. Their avg: each rest credits that player's own ${unit}-per-${c.scoring === 'games' ? 'match' : 'game'} — strong players keep their pace. Standings recompute instantly either way.</div>
    <div class="field-label">Round timer</div>
    <div class="seg" id="set-timer">
      ${[0, 10, 12, 15, 20].map(mn => `<button data-v="${mn}" class="${(c.roundTimerMin || 0) === mn ? 'on' : ''}">${mn ? mn + 'm' : 'Off'}</button>`).join('')}
    </div>
    <div class="setup-note">Shows a countdown on the round screen — for groups that play timed rounds (enter any score with “free score” mode).</div>`);
  ov.querySelector('#set-courts').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => Engine.setCourts(T, T.config.courts + (+b.dataset.d)));
    openSettingsSheet();
  }));
  ov.querySelector('#set-rounds').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => {
      const target = T.config.plannedRounds + (+b.dataset.d);
      if (T.config.format === 'americano') Engine.setPlannedRounds(T, target);
      else T.config.plannedRounds = Math.max(1, T.rounds.length, target);
    });
    openSettingsSheet();
  }));
  ov.querySelector('#set-ranking').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => { T.config.ranking = b.dataset.v; });
    openSettingsSheet();
  }));
  const sm = ov.querySelector('#set-skillmode');
  if (sm) sm.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => {
      T.config.useSkills = b.dataset.v === '1';
      Engine.redrawFuture(T); // provisional rounds recompute immediately
    });
    openSettingsSheet();
  }));
  ov.querySelector('#set-rest').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => { T.config.restMode = b.dataset.m; T.config.restPoints = 0; });
    openSettingsSheet();
  }));
  ov.querySelector('#set-timer').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    mutate(() => { T.config.roundTimerMin = +b.dataset.v; });
    openSettingsSheet();
  }));
}

function openHelpSheet() {
  sheet(`
    <div class="grab"></div>
    <h3>Rules &amp; help</h3>
    <div class="help-body">
      <p><b>Americano</b> — every round you get a new partner. A match is one long rally race: both teams' points add up to the match total (e.g. 14–10 in a 24-point match). You personally bank your team's score, win or lose. Highest individual total at the end wins.</p>
      <p><b>Mexicano</b> — round 1 is random; from round 2 the standings decide the draw: on each court, 1st+4th play 2nd+3rd of that group, so matches stay close.</p>
      <p><b>Serving</b> — one player serves <b>4 points in a row</b>, then the serve crosses to the other team. Partners take turns: each time the serve comes back to your team, the <em>other</em> partner serves. So a 24-point match goes: you serve 4 → opponent A serves 4 → your partner serves 4 → opponent B serves 4 → you again… until all points are played. Within your 4 serves, alternate service box (right, left, right, left) like normal padel. Who serves first? Spin a racket — it doesn't matter for the points. (If your group prefers 2-point serve turns, that's fine too — the app doesn't track serves.)</p>
      <p><b>Fair draws</b> — nobody sits out twice in a row, everyone's game count stays within ±1, and partners repeat only when mathematically unavoidable. Sit-out counts are shown next to resting players and in the standings.</p>
      <p><b>The schedule</b> — Americano draws every planned round upfront so you can see the whole evening. Rounds beyond the one being played are marked <b>provisional</b>: they redraw instantly if players, courts or skill badges change, and they can't be scored until it's their turn. Played scores are never touched. Mexicano draws each round only after the previous finishes — its pairings depend on the live standings.</p>
      <p><b>Sitting out</b> — earns nothing by default. Two compensation options (at setup, in Settings, or right on the standings — switch anytime, standings recompute instantly): <b>fixed</b> +half the match points per rest (neutral — resting neither costs nor pays), or <b>their avg</b> — each rest credits that player's own points-per-game, like ranking by average, so strong players keep their pace while resting.</p>
      <p><b>Rally points vs games</b> — pick your scoring at setup. <b>Rally points:</b> each match races to a combined total (e.g. 24) and the leaderboard adds up every point you bank. <b>Games (first to N):</b> each round is a mini-set played with normal 15·30·40 golden-point scoring — first to N games (usually 4) wins — and the leaderboard counts games won, not rally points. Enter the games score (e.g. 4–2) after each round. In Mexicano with games, early draws are coarser because game totals tie often; they settle as rounds add up.</p>
      <p><b>Scores</b> — tap any court card to enter or fix a score, in any round, anytime. Standings always recompute from the raw scores.</p>
      <p><b>Players</b> — Menu → Players to add, rename, remove or rejoin someone mid-session. Draws adapt from the next round; results already played are kept.</p>
      <p><b>Skill levels (optional)</b> — turn on at setup or in Settings, then give each player a badge: <b>+</b> stronger, <b>•</b> middle, <b>−</b> weaker — always relative to your group, not an official rating. Americano draws then avoid obviously lopsided matches (the two strongest never team up against the two weakest), while still rotating partners. A one-step gap is considered normal padel and stays allowed.</p>
      <p><b>Tie-breakers</b> — total points, then point difference, then wins. (Or wins first — see Settings.)</p>
      <p><b>Session timer</b> — the ⏳ chip in the header counts down the session length you picked at setup (tap it for details). Above an hour it shows h:mm; in the last hour it counts down minutes:seconds; after time it shows +overtime. The blinking dots are its heartbeat. It's just a guide — play as long as you like.</p>
      <p><b>Your data</b> — everything saves automatically in this browser. Use Menu → Export backup to move a tournament to another device or keep a record.</p>
    </div>`);
}

function exportBackup() {
  const data = JSON.stringify({ app: 'americano', v: 1, exportedAt: new Date().toISOString(), tournament: T });
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = `americano-backup-${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}-${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  toast('Backup downloaded');
}

function importBackup(file) {
  toast('Restoring…');
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      const t = obj && obj.tournament;
      if (!t || !Array.isArray(t.players) || !Array.isArray(t.rounds) || !t.config) {
        throw new Error('Not a valid Americano backup file');
      }
      T = t;
      store.saveCurrent(T);
      tab = 'rounds';
      viewRound = Math.max(0, T.rounds.length - 1);
      render();
      toast('Tournament restored');
    } catch (e) { toast(e.message, true); }
  };
  reader.onerror = () => toast('Could not read file', true);
  reader.readAsText(file);
}

/* Read-only replay of a finished, archived tournament. Operates purely on the
   stored snapshot — never touches the live tournament or localStorage. */
function openReplaySheet(entry) {
  if (!entry || !entry.snapshot) { toast('No replay saved for this one', true); return; }
  const snap = entry.snapshot;
  const st = Engine.standings(snap);
  const maxPts = Math.max(1, ...st.map(s => s.points));
  const hasRests = snap.rounds.some(r => r.resting && r.resting.length);
  const playedRounds = snap.rounds.filter(r => Engine.anyScores(r));

  const ov = sheet(`
    <div class="grab"></div>
    <button class="replay-back" id="rp-back">‹ Past tournaments</button>
    <h3>${esc(entry.name)}</h3>
    <div class="sub">${esc(entry.date)} · ${snap.config.format === 'mexicano' ? 'Mexicano' : 'Americano'} · ${playedRounds.length} round${playedRounds.length === 1 ? '' : 's'} played · read-only replay</div>

    <div class="field-label">Final standings</div>
    <table class="stand-table">
      <thead><tr><th></th><th>Player</th><th>${scoreUnitCap(snap.config)}</th><th>±</th><th>W·D·L</th>${hasRests ? '<th>Rest</th>' : ''}</tr></thead>
      <tbody>
        ${st.map((s, i) => `
          <tr class="top${i + 1}">
            <td class="rank">${i + 1}</td>
            <td class="pname">${esc(s.player.name)}${s.player.active ? '' : ' <span class="out">(left)</span>'}
              <div class="ptbar"><i style="width:${Math.round(100 * s.points / maxPts)}%"></i></div>
            </td>
            <td class="pts">${Math.round(s.points)}</td>
            <td style="color:${s.diff > 0 ? 'var(--lime)' : s.diff < 0 ? 'var(--red)' : 'var(--txt-faint)'}">${s.diff > 0 ? '+' : ''}${s.diff}</td>
            <td style="color:var(--txt-dim)">${s.wins}·${s.draws}·${s.losses}</td>
            ${hasRests ? `<td style="color:var(--txt-faint)">${s.rests}</td>` : ''}
          </tr>`).join('')}
      </tbody>
    </table>

    ${scoreViewsHTML(snap)}

    ${roundByRoundHTML(snap)}`);
  ov.querySelector('#rp-back').addEventListener('click', openHistorySheet);
}

/* Round-by-round score list — used on the results screen and in replays.
   Read-only; shows only rounds that were actually scored. */
function roundByRoundHTML(t) {
  const nm = pid => esc(Engine.playerName(t, pid));
  const playedRounds = t.rounds.filter(r => Engine.anyScores(r));
  if (playedRounds.length === 0) return '';
  return `
    <div class="field-label" style="margin-top:18px">Round by round</div>
    <div class="replay-rounds">
      ${playedRounds.map(r => {
        const ri = t.rounds.indexOf(r);
        return `
        <div class="replay-round">
          <div class="rr-head">Round ${ri + 1}</div>
          ${r.matches.map(m => {
            const scored = m.scoreA !== null && m.scoreB !== null;
            const aWin = scored && m.scoreA > m.scoreB, bWin = scored && m.scoreB > m.scoreA;
            return `
            <div class="rr-match">
              <span class="rr-team ${aWin ? 'w' : ''}">${nm(m.teamA[0])} &amp; ${nm(m.teamA[1])}</span>
              <span class="rr-score">${scored ? `${m.scoreA}<span class="d">–</span>${m.scoreB}` : '<span class="d">—</span>'}</span>
              <span class="rr-team right ${bWin ? 'w' : ''}">${nm(m.teamB[0])} &amp; ${nm(m.teamB[1])}</span>
            </div>`;
          }).join('')}
          ${r.resting && r.resting.length ? `<div class="rr-rest">Sitting out: ${r.resting.map(nm).join(', ')}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

/* ---------------- score views (bump chart · highlights · head-to-head) ---------------- */
/* Static, read-only analytics rendered from a finished tournament object — used
   on the results screen (live T) and inside replays (a stored snapshot). */

const VIEW_COLORS = ['#cdf545', '#5fd4f5', '#f5b945', '#f56960', '#b794f6', '#4fd1a5', '#f78fb3', '#7aa5ff', '#e0c068', '#9aa7b3', '#7fd1c0', '#d98fe0'];

function scoreViewsHTML(t) {
  const st = Engine.standings(t);
  const prog = Engine.progression(t);
  if (prog.length === 0) return ''; // nothing scored — no story to tell yet
  const h2h = Engine.headToHead(t);
  const blocks = bumpChartHTML(t, st, prog) + statHighlightsHTML(t, st, prog) + h2hMatrixHTML(t, st, h2h);
  return blocks ? `<div class="score-views">${blocks}</div>` : '';
}

function bumpChartHTML(t, st, prog) {
  const players = st.filter(s => s.played > 0);
  if (prog.length < 2 || players.length < 2) return ''; // need movement to show
  const total = st.length;
  const colorOf = {};
  st.forEach((s, i) => { colorOf[s.player.id] = VIEW_COLORS[i % VIEW_COLORS.length]; });

  const W = 340, mL = 12, mR = 96, mT = 10, mB = 22;
  const rowGap = Math.min(26, Math.max(15, Math.floor(150 / Math.max(1, total - 1))));
  const H = mT + (total - 1) * rowGap + mB;
  const plotW = W - mL - mR;
  const xOf = i => mL + (prog.length === 1 ? 0 : (i / (prog.length - 1)) * plotW);
  const yOf = rank => mT + rank * rowGap;

  const lines = players.map(s => {
    const pid = s.player.id, col = colorOf[pid];
    const pts = prog.map((step, i) => `${xOf(i).toFixed(1)},${yOf(step.rank[pid]).toFixed(1)}`).join(' ');
    const dots = prog.map((step, i) => `<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(step.rank[pid]).toFixed(1)}" r="2.6" fill="${col}"/>`).join('');
    const finalRank = prog[prog.length - 1].rank[pid];
    const label = `<text x="${mL + plotW + 6}" y="${(yOf(finalRank) + 3.5).toFixed(1)}" fill="${col}" font-size="11" font-weight="700">${esc(s.player.name).slice(0, 12)}</text>`;
    return `<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>${dots}${label}`;
  }).join('');
  const xlabels = prog.map((step, i) => `<text x="${xOf(i).toFixed(1)}" y="${H - 6}" fill="#5d6b77" font-size="9" text-anchor="middle">${step.round}</text>`).join('');

  return `
    <div class="sv-block">
      <div class="sv-title">Rank timeline</div>
      <div class="sv-sub">Who moved up or down each round — 1st sits at the top.</div>
      <svg class="bump-svg" viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Rank over the rounds">${lines}${xlabels}</svg>
    </div>`;
}

function statHighlightsHTML(t, st, prog) {
  const nm = pid => esc(Engine.playerName(t, pid));
  const card = (ico, label, big, sub) =>
    `<div class="stat-card"><div class="sc-ico">${ico}</div><div class="sc-label">${label}</div><div class="sc-big">${big}</div><div class="sc-sub">${sub}</div></div>`;
  const cards = [];

  // biggest climber (first scored round → final); else wire-to-wire leader
  if (prog.length >= 2) {
    const first = prog[0].rank, lastStep = prog[prog.length - 1];
    let best = null;
    for (const s of st) {
      if (s.played <= 0) continue;
      const d = (first[s.player.id] ?? 0) - lastStep.rank[s.player.id]; // + = climbed up the table
      if (d > 0 && (!best || d > best.d)) best = { id: s.player.id, d };
    }
    if (best) cards.push(card('🚀', 'Biggest climber', nm(best.id), `up ${best.d} place${best.d > 1 ? 's' : ''} since round ${prog[0].round}`));
    else {
      const winner = lastStep.order[0];
      if (prog.every(s => s.order[0] === winner)) cards.push(card('🏁', 'Wire to wire', nm(winner), `top of the table from round ${prog[0].round} on`));
    }
  }

  // best single round = highest individual match score
  let br = null;
  t.rounds.forEach((r, ri) => {
    for (const m of r.matches) {
      if (m.scoreA === null || m.scoreB === null) continue;
      const hi = Math.max(m.scoreA, m.scoreB);
      if (!br || hi > br.score) br = { score: hi, team: m.scoreA >= m.scoreB ? m.teamA : m.teamB, round: ri + 1 };
    }
  });
  if (br) cards.push(card('🔥', 'Best round', `${nm(br.team[0])} &amp; ${nm(br.team[1])}`, `${br.score} ${scoreUnit(t.config)} in round ${br.round}`));

  // closest finish = smallest gap between adjacent finishers who played
  const played = st.filter(s => s.played > 0);
  if (played.length >= 2) {
    let cf = null;
    for (let i = 1; i < played.length; i++) {
      const gap = Math.round(played[i - 1].points) - Math.round(played[i].points);
      if (cf === null || gap < cf.gap) cf = { gap, a: played[i - 1].player.id, b: played[i].player.id };
    }
    if (cf) cards.push(card('⚔️', 'Closest finish', `${nm(cf.a)} vs ${nm(cf.b)}`, cf.gap === 0 ? `dead level on ${scoreUnit(t.config)}` : `just ${cf.gap} ${t.config.scoring === 'games' ? 'game' : 'pt'}${cf.gap > 1 ? 's' : ''} apart`));
  }

  if (!cards.length) return '';
  return `<div class="sv-block"><div class="sv-title">Highlights</div><div class="stat-cards">${cards.join('')}</div></div>`;
}

function h2hMatrixHTML(t, st, h2h) {
  const players = st.filter(s => s.played > 0);
  if (players.length < 2) return '';
  let anyFaced = false;
  for (const a of players) { for (const b of players) { if (a.player.id !== b.player.id && h2h[a.player.id][b.player.id]) { anyFaced = true; break; } } if (anyFaced) break; }
  if (!anyFaced) return '';

  const head = players.map((s, j) => `<th class="h2h-col">${j + 1}</th>`).join('');
  const rows = players.map((s, i) => {
    const cells = players.map((o, j) => {
      if (i === j) return '<td class="h2h-diag">·</td>';
      const rec = h2h[s.player.id][o.player.id];
      if (!rec || !rec.faced) return '<td class="h2h-na">–</td>';
      const cls = rec.net > 0 ? 'pos' : rec.net < 0 ? 'neg' : 'evn';
      return `<td class="h2h-cell ${cls}" title="${esc(s.player.name)} vs ${esc(o.player.name)}: ${rec.wins}W ${rec.draws}D ${rec.losses}L">${rec.net > 0 ? '+' : ''}${rec.net}</td>`;
    }).join('');
    return `<tr><th class="h2h-row">${i + 1}. ${esc(s.player.name).slice(0, 10)}</th>${cells}</tr>`;
  }).join('');

  return `
    <div class="sv-block">
      <div class="sv-title">Head to head</div>
      <div class="sv-sub">Net points when two players were on opposing teams — <span style="color:var(--lime)">green ahead</span>, <span style="color:var(--red)">red behind</span>. Columns are the numbered players.</div>
      <div class="h2h-scroll">
        <table class="h2h-matrix">
          <thead><tr><th class="h2h-corner"></th>${head}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function copyStandings() {
  const st = Engine.standings(T);
  const medals = ['🥇', '🥈', '🥉'];
  const lines = [
    `🎾 ${T.config.name} — ${new Date(T.createdAt || Date.now()).toLocaleDateString()}`,
    `${T.config.format === 'mexicano' ? 'Mexicano' : 'Americano'} · ${T.rounds.length} rounds · ${matchGoalText(T.config)}`,
    '',
    ...st.map((s, i) => `${medals[i] || (i + 1) + '.'} ${s.player.name} — ${Math.round(s.points)} ${scoreUnit(T.config)} (${s.wins}W ${s.draws}D ${s.losses}L, ${s.diff > 0 ? '+' : ''}${s.diff})`),
  ];
  copyText(lines.join('\n'), 'Standings copied');
}

function copyText(text, okMsg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    toast('Copying…');
    navigator.clipboard.writeText(text).then(() => toast(okMsg), () => toast('Copy failed', true));
  } else toast('Clipboard unavailable', true);
}

function copyRoundDraws() {
  const r = T.rounds[viewRound];
  const prov = T.config.format === 'americano' && viewRound > currentRoundIdx(T) && !Engine.anyScores(r);
  const lines = [
    `🎾 ${T.config.name} — Round ${viewRound + 1}${prov ? ' (provisional)' : ''}`,
    ...r.matches.map((m, i) =>
      `Court ${i + 1}: ${Engine.playerName(T, m.teamA[0])} + ${Engine.playerName(T, m.teamA[1])} vs ${Engine.playerName(T, m.teamB[0])} + ${Engine.playerName(T, m.teamB[1])}` +
      (m.scoreA !== null ? `  (${m.scoreA}–${m.scoreB})` : '')),
  ];
  if (r.resting.length) lines.push('Sitting out: ' + r.resting.map(pid => Engine.playerName(T, pid)).join(', '));
  copyText(lines.join('\n'), 'Round draws copied');
}

/* ---------------- finish / results ---------------- */

function finishTournament() {
  mutate(() => {
    T.finished = true;
    store.archive(T);
    const act = Engine.activePlayers(T);
    store.saveLastPlayers(
      act.map(p => p.name),
      Object.fromEntries(act.map(p => [p.name.toLowerCase(), p.skill || 2])),
      T.config.useSkills);
  });
}

function renderResults() {
  const st = Engine.standings(T);
  const [p1, p2, p3] = st;
  const colors = ['#cdf545', '#5fd4f5', '#f5b945', '#f56960', '#e8edf2'];
  const confetti = Array.from({ length: 40 }, (_, i) =>
    `<div class="confetti" style="left:${Math.random() * 100}%;background:${colors[i % colors.length]};animation-delay:${(Math.random() * 1.2).toFixed(2)}s;transform:rotate(${Math.random() * 360}deg)"></div>`).join('');

  app.innerHTML = `
  <div class="screen">
    <div class="content" style="padding-top:30px">
      <div class="results-inner">
      <div class="podium-wrap">
        ${confetti}
        <h2>Final standings</h2>
        <div class="sub">${esc(T.config.name)} · ${T.rounds.length} rounds · ${new Date(T.createdAt || Date.now()).toLocaleDateString()}</div>
        <div class="podium">
          ${p2 ? `<div class="pod p2"><div class="pname">${esc(p2.player.name)}</div><div class="ppts">${Math.round(p2.points)} ${scoreUnit(T.config)}</div><div class="block">2</div></div>` : ''}
          ${p1 ? `<div class="pod p1"><div class="pname">${esc(p1.player.name)}</div><div class="ppts">${Math.round(p1.points)} ${scoreUnit(T.config)}</div><div class="block">1</div></div>` : ''}
          ${p3 ? `<div class="pod p3"><div class="pname">${esc(p3.player.name)}</div><div class="ppts">${Math.round(p3.points)} ${scoreUnit(T.config)}</div><div class="block">3</div></div>` : ''}
        </div>
      </div>
      <table class="stand-table">
        <thead><tr><th></th><th>Player</th><th>${scoreUnitCap(T.config)}</th><th>±</th><th>W·D·L</th></tr></thead>
        <tbody>
          ${st.map((s, i) => `
            <tr class="top${i + 1}">
              <td class="rank">${i + 1}</td>
              <td class="pname">${esc(s.player.name)}</td>
              <td class="pts">${Math.round(s.points)}</td>
              <td style="color:${s.diff > 0 ? 'var(--lime)' : s.diff < 0 ? 'var(--red)' : 'var(--txt-faint)'}">${s.diff > 0 ? '+' : ''}${s.diff}</td>
              <td style="color:var(--txt-dim)">${s.wins}·${s.draws}·${s.losses}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${scoreViewsHTML(T)}
      ${roundByRoundHTML(T)}
      <div class="round-actions" style="margin-top:24px">
        <button class="btn btn-primary btn-block" id="res-share">📋 Copy results</button>
        <button class="btn btn-ghost btn-block" id="res-new">Start a new tournament</button>
        <button class="btn btn-ghost btn-block" id="res-back">← Back to rounds (reopen)</button>
      </div>
      </div>
      ${footerHTML()}
    </div>
  </div>`;
  $('#res-share').addEventListener('click', copyStandings);
  $('#res-new').addEventListener('click', () => {
    store.clearCurrent(); T = null; setupState = defaultSetup(); render();
  });
  $('#res-back').addEventListener('click', () => mutate(() => { T.finished = false; }));
}

/* ---------------- root ---------------- */

let lastScreen = null;
function render() {
  closeSheet();
  if (checkin) {
    renderReadiness();
  } else if (!T) {
    if (!setupState) setupState = defaultSetup();
    renderSetup();
  } else {
    renderPlay();
  }
  // Reset scroll to the top on a real screen/tab change — each transition is triggered
  // by a button at the bottom of the previous screen, so without this the new screen
  // inherits the old bottom scroll. In-place re-renders (scoring, round nav) keep position.
  const screen = checkin ? 'checkin' : !T ? 'setup' : T.finished ? 'results' : 'play:' + tab;
  if (screen !== lastScreen) { window.scrollTo(0, 0); lastScreen = screen; }
}

const warn = document.getElementById('js-warn');
if (warn) warn.remove();
render();
})();
</script>
