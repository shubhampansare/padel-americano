<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>Americano — Padel Tournament</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23cdf545'/%3E%3Cpath d='M5 10 Q16 16 5 22 M27 10 Q16 16 27 22' stroke='%23151a20' stroke-width='2' fill='none'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #0b0e11;
  --bg1: #12161b;
  --bg2: #1a2027;
  --bg3: #222a33;
  --steel: #2e3842;
  --steel-hi: #46545f;
  --line: #2a333d;
  --txt: #e8edf2;
  --txt-dim: #97a4b0;
  --txt-faint: #5d6b77;
  --lime: #cdf545;
  --lime-deep: #a8cf1f;
  --lime-glow: rgba(205, 245, 69, .14);
  --amber: #f5b945;
  --red: #f56960;
  --cyan: #5fd4f5;
  --court: #1d4f46;
  --court-line: #2d6e62;
  --disp: "Barlow Condensed", "Arial Narrow", sans-serif;
  --body: "Barlow", "Helvetica Neue", sans-serif;
  --rad: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
html, body { overflow-x: clip; }
body {
  font-family: var(--body);
  background: var(--bg0);
  color: var(--txt);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}
#app { width: 100%; max-width: 560px; margin: 0 auto; position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }
button { font-family: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select { font-family: inherit; }
.hidden { display: none !important; }

/* ============ shared bits ============ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--disp); font-weight: 700; font-size: 1.05rem; letter-spacing: .06em; text-transform: uppercase;
  padding: 14px 22px; border-radius: var(--rad);
  background: linear-gradient(180deg, var(--bg3), var(--bg2));
  border: 1px solid var(--steel);
  box-shadow: 0 2px 0 rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
  transition: transform .08s, filter .15s;
  user-select: none; -webkit-user-select: none;
}
.btn:active { transform: translateY(1px); filter: brightness(1.15); }
.btn-primary {
  background: linear-gradient(180deg, var(--lime), var(--lime-deep));
  color: #15200a; border-color: var(--lime-deep);
  box-shadow: 0 3px 0 #74900f, 0 0 24px var(--lime-glow), inset 0 1px 0 rgba(255,255,255,.35);
}
.btn-ghost { background: none; border-color: var(--line); box-shadow: none; color: var(--txt-dim); }
.btn-danger { color: var(--red); border-color: rgba(245,105,96,.35); }
.btn[disabled] { opacity: .4; pointer-events: none; }
.btn-block { width: 100%; }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: .82rem; font-weight: 600; color: var(--txt-dim);
  background: var(--bg2); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px;
}
.seg { display: flex; background: var(--bg1); border: 1px solid var(--line); border-radius: var(--rad); padding: 4px; gap: 4px; }
.seg button {
  flex: 1; padding: 11px 8px; border-radius: 10px; font-weight: 600; font-size: .92rem; color: var(--txt-dim);
  transition: all .15s;
}
.seg button.on { background: linear-gradient(180deg, var(--steel-hi), var(--steel)); color: var(--txt); box-shadow: 0 1px 0 rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08); }
.seg button.on.lime { background: linear-gradient(180deg, var(--lime), var(--lime-deep)); color: #15200a; }

.field-label {
  font-family: var(--disp); font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  font-size: .8rem; color: var(--txt-faint); display: flex; justify-content: space-between; align-items: baseline;
  margin: 22px 0 8px;
}
.field-label .hint { font-family: var(--body); font-weight: 500; letter-spacing: 0; text-transform: none; font-size: .78rem; color: var(--txt-faint); }

.stepper { display: flex; align-items: center; gap: 0; background: var(--bg1); border: 1px solid var(--line); border-radius: var(--rad); overflow: hidden; }
.stepper button { width: 56px; height: 52px; font-size: 1.6rem; color: var(--txt-dim); font-weight: 700; flex-shrink: 0; }
.stepper button:active { background: var(--bg3); color: var(--lime); }
.stepper .stepper-val {
  flex: 1; text-align: center; font-family: var(--disp); font-size: 1.7rem; font-weight: 700;
  font-variant-numeric: tabular-nums; border-left: 1px solid var(--line); border-right: 1px solid var(--line); align-self: stretch; display: flex; align-items: center; justify-content: center;
}

/* ============ setup screen ============ */
.screen { flex: 1; display: flex; flex-direction: column; animation: fadein .25s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.setup-hero {
  padding: 34px 20px 22px;
  background:
    radial-gradient(120% 90% at 80% -20%, rgba(205,245,69,.10), transparent 60%),
    linear-gradient(180deg, #1c232b, #12161b);
  border-bottom: 1px solid var(--line);
  position: relative; overflow: hidden;
}
.setup-hero::after { /* court diagram */
  content: ""; position: absolute; right: -36px; top: 18px; width: 150px; height: 96px;
  border: 2px solid rgba(205,245,69,.16); border-radius: 6px;
  background:
    linear-gradient(rgba(205,245,69,.16), rgba(205,245,69,.16)) 50% 0/2px 100% no-repeat,
    linear-gradient(rgba(205,245,69,.16), rgba(205,245,69,.16)) 0 50%/100% 2px no-repeat;
  transform: rotate(8deg);
}
.brand { font-family: var(--disp); font-weight: 800; font-size: 2.6rem; line-height: .95; text-transform: uppercase; letter-spacing: .02em; }
.brand em { font-style: normal; color: var(--lime); }
.tagline { color: var(--txt-dim); margin-top: 8px; font-size: .95rem; max-width: 30ch; }

.setup-body { padding: 6px 20px 40px; }
.player-row { display: flex; align-items: center; gap: 10px; background: var(--bg1); border: 1px solid var(--line); border-radius: 12px; padding: 4px 4px 4px 14px; margin-bottom: 8px; animation: fadein .2s ease; }
.player-row .pnum { font-family: var(--disp); font-weight: 700; color: var(--txt-faint); width: 20px; font-size: .95rem; }
.player-row input { flex: 1; background: none; border: none; color: var(--txt); font-size: 1.02rem; font-weight: 500; padding: 10px 0; outline: none; min-width: 0; }
.player-row .del { width: 42px; height: 42px; border-radius: 10px; color: var(--txt-faint); font-size: 1.2rem; flex-shrink: 0; }
.player-row .del:active { color: var(--red); background: var(--bg2); }
.skill-badge {
  width: 40px; height: 42px; border-radius: 10px; flex-shrink: 0;
  font-family: var(--disp); font-weight: 800; font-size: 1.25rem;
  background: var(--bg2); border: 1px solid var(--line); color: var(--txt-faint);
  transition: all .12s;
}
.skill-badge.sk3 { color: var(--lime); border-color: rgba(205,245,69,.45); background: rgba(205,245,69,.08); }
.skill-badge.sk1 { color: var(--amber); border-color: rgba(245,185,69,.45); background: rgba(245,185,69,.08); }
.skill-badge:active { transform: scale(.94); }
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; }
.preset-row .chipbtn {
  font-family: var(--disp); font-weight: 700; font-size: 1.12rem; font-variant-numeric: tabular-nums;
  padding: 10px 0; border-radius: 12px; border: 1px solid var(--line); background: var(--bg1); color: var(--txt-dim);
  flex: 1; min-width: 56px; transition: all .15s;
}
.preset-row .chipbtn.on { background: linear-gradient(180deg, var(--lime), var(--lime-deep)); color: #15200a; border-color: var(--lime-deep); box-shadow: 0 0 18px var(--lime-glow); }
.preset-row input.chipbtn { text-align: center; outline: none; }
.preset-row input.chipbtn.on { box-shadow: 0 0 18px var(--lime-glow); }
.setup-note { font-size: .82rem; color: var(--txt-faint); margin-top: 8px; line-height: 1.45; }
.setup-note b { color: var(--txt-dim); }

/* ============ play screen header ============ */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background:
    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0) 45%),
    linear-gradient(180deg, #1d242c, #151a20);
  border-bottom: 1px solid var(--steel);
  box-shadow: 0 4px 16px rgba(0,0,0,.45);
  padding: 12px 16px calc(10px);
  display: flex; align-items: center; gap: 12px;
}
.topbar .tname { font-family: var(--disp); font-weight: 800; text-transform: uppercase; font-size: 1.3rem; letter-spacing: .03em; line-height: 1; }
.topbar .tsub { color: var(--txt-faint); font-size: .76rem; margin-top: 3px; font-weight: 500; }
.topbar .grow { flex: 1; min-width: 0; }
.timer-chip {
  font-family: var(--disp); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 1.05rem;
  color: var(--lime); background: var(--lime-glow); border: 1px solid rgba(205,245,69,.25); border-radius: 10px; padding: 7px 11px;
  letter-spacing: .04em;
}
.timer-chip.over { color: var(--amber); background: rgba(245,185,69,.12); border-color: rgba(245,185,69,.3); }
.timer-chip .tick { transition: opacity .25s; }
.timer-chip .tick.dim { opacity: .2; }
.menu-btn { width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg2); font-size: 1.3rem; color: var(--txt-dim); line-height: 1; }

/* ============ tabs ============ */
.tabbar {
  position: sticky; bottom: 0; z-index: 30; display: flex;
  background: linear-gradient(0deg, #10141a 70%, rgba(16,20,26,.92));
  border-top: 1px solid var(--steel);
  padding: 6px 8px calc(8px + env(safe-area-inset-bottom));
  gap: 6px;
}
.tabbar button {
  flex: 1; padding: 10px 4px 8px; border-radius: 12px; color: var(--txt-faint);
  font-family: var(--disp); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; font-size: .92rem;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.tabbar button .ico { font-size: 1.25rem; line-height: 1; filter: grayscale(1) opacity(.6); }
.tabbar button.on { color: var(--lime); background: var(--lime-glow); }
.tabbar button.on .ico { filter: none; }

.content { flex: 1; padding: 16px 16px 28px; }

/* ============ round nav ============ */
.round-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.round-nav button.nav { width: 46px; height: 46px; border-radius: 12px; background: var(--bg2); border: 1px solid var(--line); font-size: 1.25rem; color: var(--txt-dim); flex-shrink: 0; }
.round-nav button.nav[disabled] { opacity: .25; }
.round-title { flex: 1; text-align: center; }
.round-title h2 { font-family: var(--disp); font-weight: 800; text-transform: uppercase; font-size: 1.55rem; letter-spacing: .04em; }
.round-title .round-dots { display: flex; gap: 5px; justify-content: center; margin-top: 5px; flex-wrap: wrap; }
.round-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--line); }
.round-dots i.done { background: var(--lime); border-color: var(--lime-deep); }
.round-dots i.part { background: var(--amber); border-color: var(--amber); }
.round-dots i.cur { outline: 2px solid var(--steel-hi); outline-offset: 1px; }
.round-dots i.future { opacity: .4; }

/* ============ match card = mini court ============ */
.court-card {
  position: relative; border-radius: var(--rad); overflow: hidden; margin-top: 14px;
  background:
    linear-gradient(160deg, rgba(255,255,255,.05), rgba(255,255,255,0) 38%),
    linear-gradient(180deg, #1f5a4f, var(--court));
  border: 1px solid var(--court-line);
  box-shadow: 0 6px 18px rgba(0,0,0,.35), inset 0 0 0 1px rgba(0,0,0,.2);
  animation: fadein .25s ease backwards;
}
.court-card:nth-child(2) { animation-delay: .05s; }
.court-card:nth-child(3) { animation-delay: .1s; }
.court-card:nth-child(4) { animation-delay: .15s; }
.court-card::before { /* outer court lines */
  content: ""; position: absolute; inset: 10px; border: 1.5px solid rgba(232,237,242,.22); border-radius: 6px; pointer-events: none;
}
.court-head { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px 0; position: relative; z-index: 1; }
.court-head .cname { font-family: var(--disp); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; font-size: .8rem; color: rgba(232,237,242,.6); }
.court-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 14px 16px; position: relative; z-index: 1; gap: 6px; }
.team { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.team .tp {
  font-weight: 600; font-size: .98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  background: rgba(11,14,17,.45); border: 1px solid rgba(232,237,242,.1); padding: 7px 10px; border-radius: 9px;
}
.team.right .tp { text-align: right; }
.vs-block { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 0 6px; }
.vs-score {
  font-family: var(--disp); font-weight: 800; font-size: 2rem; font-variant-numeric: tabular-nums; letter-spacing: .02em;
  display: flex; align-items: baseline; gap: 7px; line-height: 1;
}
.vs-score .dash { color: rgba(232,237,242,.4); font-size: 1.2rem; }
.vs-score .w { color: var(--lime); text-shadow: 0 0 14px rgba(205,245,69,.5); }
.vs-empty {
  font-family: var(--disp); font-weight: 700; font-size: .95rem; letter-spacing: .1em; color: rgba(232,237,242,.55);
  border: 1.5px dashed rgba(232,237,242,.3); border-radius: 999px; padding: 9px 14px; text-transform: uppercase;
}
.court-card .tap-hint { position: absolute; inset: 0; z-index: 2; }
.court-card.scored .tap-hint:active ~ * { opacity: .9; }

/* resting row */
.rest-row { margin-top: 16px; background: var(--bg1); border: 1px dashed var(--steel); border-radius: var(--rad); padding: 12px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rest-row .rlabel { font-family: var(--disp); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; font-size: .78rem; color: var(--amber); }
.rest-row .chip { background: rgba(245,185,69,.08); border-color: rgba(245,185,69,.25); color: var(--txt); }

.round-actions { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
.banner {
  margin-top: 16px; border-radius: var(--rad); padding: 14px 16px; font-size: .92rem; line-height: 1.5;
  background: var(--lime-glow); border: 1px solid rgba(205,245,69,.3); color: var(--txt);
}
.banner b { color: var(--lime); }

/* ============ standings ============ */
.stand-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
.stand-table th {
  font-family: var(--disp); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; font-size: .72rem;
  color: var(--txt-faint); text-align: right; padding: 8px 6px; border-bottom: 1px solid var(--line);
}
.stand-table th:nth-child(2) { text-align: left; }
.stand-table td { padding: 11px 6px; border-bottom: 1px solid var(--bg2); text-align: right; font-variant-numeric: tabular-nums; font-size: .95rem; }
.stand-table td.rank { font-family: var(--disp); font-weight: 800; font-size: 1.05rem; color: var(--txt-faint); width: 34px; text-align: center; }
.stand-table tr.top1 td.rank { color: var(--lime); }
.stand-table tr.top2 td.rank, .stand-table tr.top3 td.rank { color: var(--cyan); }
.stand-table td.pname { text-align: left; font-weight: 600; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stand-table td.pname .out { color: var(--txt-faint); font-size: .76rem; font-weight: 500; }
.stand-table td.pts { font-family: var(--disp); font-weight: 800; font-size: 1.2rem; color: var(--lime); }
.stand-table .mov { font-size: .72rem; width: 18px; display: inline-block; }
.stand-table .mov.up { color: var(--lime); } .stand-table .mov.dn { color: var(--red); }
.ptbar { height: 3px; border-radius: 2px; background: var(--bg3); margin-top: 5px; overflow: hidden; }
.ptbar i { display: block; height: 100%; background: linear-gradient(90deg, var(--lime-deep), var(--lime)); border-radius: 2px; }

/* ============ modal / sheet ============ */
/* The OVERLAY is the scroll container. Sheets are positioned with REAL spacer
   elements, not flex auto-margins — WebKit/iOS makes auto-margin-pushed content
   unscrollable inside overflow containers, which is exactly the bug this avoids.
   Tall sheet => the overlay scrolls; short sheet => spacer pushes it to the bottom. */
.overlay {
  position: fixed; inset: 0; background: rgba(5,7,9,.7); backdrop-filter: blur(3px);
  z-index: 50; display: none; animation: fadein .15s ease;
}
.overlay.open {
  display: flex; flex-direction: column; align-items: center;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
.ovspace { flex: 1 0 auto; min-height: 48px; width: 100%; align-self: stretch; }
.ovspace-b { flex: 0 0 0; min-height: 0; }
.sheet {
  width: 100%; max-width: 520px; background: linear-gradient(180deg, #1b222a, #141920);
  border: 1px solid var(--steel); border-bottom: none; border-radius: 22px 22px 0 0;
  padding: 14px 20px calc(28px + env(safe-area-inset-bottom));
  box-shadow: 0 -12px 40px rgba(0,0,0,.5);
  animation: slideup .22s cubic-bezier(.2,.9,.3,1);
  flex-shrink: 0;
}
/* iOS-proof page freeze while a sheet is open — background must never steal the scroll */
body.sheet-lock { position: fixed; left: 0; right: 0; overflow: hidden; }
@keyframes slideup { from { transform: translateY(40px); opacity: .4; } to { transform: none; opacity: 1; } }
.sheet .grab { width: 44px; height: 4px; border-radius: 2px; background: var(--steel-hi); margin: 0 auto 14px; }
.sheet h3 { font-family: var(--disp); font-weight: 800; text-transform: uppercase; font-size: 1.3rem; letter-spacing: .04em; margin-bottom: 4px; }
.sheet .sub { color: var(--txt-dim); font-size: .88rem; margin-bottom: 14px; }

/* score entry */
.score-grid { display: grid; grid-template-columns: 1fr 16px 1fr; gap: 10px; align-items: stretch; margin: 14px 0 6px; }
.score-team { background: var(--bg1); border: 1px solid var(--line); border-radius: 16px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.score-team.winning { border-color: rgba(205,245,69,.4); box-shadow: 0 0 18px var(--lime-glow); }
.score-team .names { font-size: .85rem; font-weight: 600; color: var(--txt-dim); text-align: center; line-height: 1.35; min-height: 2.4em; display: flex; flex-direction: column; justify-content: center; }
.score-team .bignum { font-family: var(--disp); font-weight: 800; font-size: 3.6rem; line-height: 1; font-variant-numeric: tabular-nums; margin: 6px 0 8px; }
.score-team.winning .bignum { color: var(--lime); text-shadow: 0 0 22px rgba(205,245,69,.4); }
.score-team .pmrow { display: flex; gap: 8px; width: 100%; }
.score-team .pmrow button {
  flex: 1; height: 54px; border-radius: 12px; background: var(--bg3); border: 1px solid var(--steel);
  font-size: 1.5rem; font-weight: 700; color: var(--txt);
}
.score-team .pmrow button:active { background: var(--steel); color: var(--lime); }
.score-colon { display: flex; align-items: center; justify-content: center; font-family: var(--disp); font-size: 1.6rem; color: var(--txt-faint); font-weight: 700; }
.score-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; margin: 16px 0 6px; height: 30px; background: transparent; cursor: pointer;
  --trk: linear-gradient(90deg, var(--steel) 0 100%);
}
.score-slider::-webkit-slider-runnable-track {
  height: 10px; border-radius: 5px; background: var(--trk);
  border: 1px solid rgba(232,237,242,.08);
}
.score-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
  background: var(--lime); border: 2px solid #15200a; margin-top: -9px;
  box-shadow: 0 0 12px rgba(205,245,69,.45);
}
.score-slider::-moz-range-track { height: 10px; border-radius: 5px; background: var(--trk); }
.score-slider::-moz-range-thumb {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--lime); border: 2px solid #15200a; box-shadow: 0 0 12px rgba(205,245,69,.45);
}
.sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
.sheet-actions .btn { flex: 1; }

/* menu sheet */
.menu-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.menu-list .btn { justify-content: flex-start; text-transform: none; letter-spacing: .01em; font-family: var(--body); font-weight: 600; font-size: 1rem; }
.menu-list .btn .ico { width: 24px; text-align: center; }

/* players sheet */
.proster .player-row { margin-bottom: 8px; }
.proster .pstat { font-size: .75rem; color: var(--txt-faint); white-space: nowrap; }

/* confirm */
.confirm-box { text-align: center; padding: 8px 4px 2px; }
.confirm-box p { color: var(--txt-dim); font-size: .95rem; line-height: 1.5; margin: 8px 0 18px; }

/* ============ podium / results ============ */
.podium-wrap { text-align: center; padding: 26px 0 8px; position: relative; }
.podium-wrap h2 { font-family: var(--disp); font-weight: 800; text-transform: uppercase; font-size: 2rem; letter-spacing: .05em; }
.podium-wrap .sub { color: var(--txt-dim); margin-top: 4px; font-size: .9rem; }
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin: 26px 0 10px; }
.pod { width: 96px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.pod .pname { font-weight: 700; font-size: .95rem; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pod .ppts { font-family: var(--disp); color: var(--txt-dim); font-size: .85rem; }
.pod .block {
  width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: center; justify-content: center; padding-top: 8px;
  font-family: var(--disp); font-weight: 800; font-size: 1.9rem;
  background: linear-gradient(180deg, var(--steel-hi), var(--steel)); border: 1px solid var(--steel-hi); border-bottom: none;
}
.pod.p1 .block { height: 96px; background: linear-gradient(180deg, var(--lime), var(--lime-deep)); color: #15200a; box-shadow: 0 0 34px var(--lime-glow); }
.pod.p2 .block { height: 70px; }
.pod.p3 .block { height: 52px; background: linear-gradient(180deg, #3a464f, #2b343b); }
.confetti { position: absolute; width: 8px; height: 14px; top: -20px; opacity: 0; animation: confetti 2.6s ease-in forwards; pointer-events: none; }
@keyframes confetti {
  0% { opacity: 1; transform: translateY(0) rotate(0); }
  100% { opacity: 0; transform: translateY(72vh) rotate(720deg); }
}

/* history list */
.hist-item { background: var(--bg1); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.hist-item .ht { font-weight: 700; }
.hist-item .hs { color: var(--txt-dim); font-size: .84rem; margin-top: 3px; line-height: 1.5; }

/* toast */
#toast {
  position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%) translateY(20px);
  background: var(--bg3); color: var(--txt); border: 1px solid var(--steel-hi);
  padding: 11px 18px; border-radius: 12px; font-size: .92rem; font-weight: 600;
  opacity: 0; pointer-events: none; transition: all .25s; z-index: 99; max-width: 88vw; text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
#toast.show { opacity: 1; transform: translateX(-50%); }
#toast.err { border-color: rgba(245,105,96,.5); color: #ffd9d6; }

/* panes: mobile = tab-switched, desktop = side by side */
.panes { flex: 1; display: flex; flex-direction: column; }
.pane { display: none; }
.pane.active { display: block; }
.pane-title { display: none; }

@media (min-width: 600px) {
  body { background: radial-gradient(80% 60% at 50% 0%, #131b1a, var(--bg0)); }
  #app { border-left: 1px solid var(--line); border-right: 1px solid var(--line); max-width: 760px; }
  .content, .setup-body { padding-left: 28px; padding-right: 28px; }
  .setup-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px; align-items: start; }
  .setup-footer { grid-column: 1 / -1; max-width: 520px; width: 100%; margin: 0 auto; }
}

/* ============ desktop layout ============ */
@media (min-width: 900px) {
  #app { max-width: 1160px; }
  .tabbar { display: none; }
  .panes { flex-direction: row; align-items: flex-start; gap: 10px; }
  .pane { display: block; }
  #pane-rounds { flex: 1.15; min-width: 0; }
  #pane-standings { flex: 1; min-width: 0; position: sticky; top: 78px; }
  .pane-title {
    display: block; font-family: var(--disp); font-weight: 800; text-transform: uppercase;
    font-size: 1.55rem; letter-spacing: .04em; text-align: center; padding: 9px 0 14px;
  }
  .overlay.open { padding: 0 24px; }
  .ovspace, .ovspace-b { flex: 1 0 auto; min-height: 24px; } /* centered card on desktop */
  .sheet { border-radius: 22px; border-bottom: 1px solid var(--steel); }
  .setup-body { gap: 0 48px; }
  .setup-hero::after { right: 40px; width: 220px; height: 140px; }
  .results-inner { max-width: 600px; margin: 0 auto; }
}

/* score number input */
.score-team input.bignum {
  background: none; border: none; outline: none; width: 100%; padding: 0;
  text-align: center; color: inherit; appearance: textfield; -moz-appearance: textfield;
}
.score-team input.bignum::-webkit-outer-spin-button,
.score-team input.bignum::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* round timer */
.rtimer {
  margin-top: 14px; display: flex; align-items: center; gap: 10px;
  background: var(--bg1); border: 1px solid var(--line); border-radius: var(--rad); padding: 10px 12px 10px 16px;
}
.rtimer .t { font-family: var(--disp); font-weight: 800; font-size: 1.7rem; font-variant-numeric: tabular-nums; flex: 1; color: var(--lime); }
.rtimer.done { border-color: rgba(245,105,96,.55); animation: tpulse 1s ease infinite; }
.rtimer.done .t { color: var(--red); }
@keyframes tpulse { 50% { background: rgba(245,105,96,.08); } }
.rtimer .btn { padding: 10px 16px; }

/* TV mode */
#tv {
  position: fixed; inset: 0; z-index: 80; background: var(--bg0); display: none;
  padding: 4vh 4vw; overflow: auto; cursor: pointer;
}
#tv.open { display: block; }
#tv .tv-head { display: flex; align-items: baseline; gap: 18px; margin-bottom: 3vh; }
#tv .tv-head h1 { font-family: var(--disp); font-weight: 800; text-transform: uppercase; font-size: clamp(1.6rem, 4vw, 3rem); }
#tv .tv-head .rnd { color: var(--lime); font-family: var(--disp); font-weight: 700; font-size: clamp(1.1rem, 2.6vw, 2rem); }
#tv .tv-head .hint-exit { margin-left: auto; color: var(--txt-faint); font-size: .85rem; }
#tv .tv-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 4vw; align-items: start; }
#tv table { width: 100%; border-collapse: collapse; }
#tv td, #tv th { padding: .8vh 8px; font-size: clamp(1rem, 2.2vw, 1.7rem); border-bottom: 1px solid var(--bg3); text-align: left; font-variant-numeric: tabular-nums; }
#tv td.r { text-align: right; font-family: var(--disp); font-weight: 800; color: var(--lime); }
#tv td.rk { color: var(--txt-faint); font-family: var(--disp); font-weight: 800; width: 2ch; }
#tv .tv-match { background: var(--bg1); border: 1px solid var(--court-line); border-radius: 12px; padding: 1.6vh 18px; margin-bottom: 1.6vh; font-size: clamp(1rem, 2.2vw, 1.6rem); }
#tv .tv-match .c { font-family: var(--disp); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--txt-faint); font-size: .7em; }
#tv .tv-match .sc { color: var(--lime); font-family: var(--disp); font-weight: 800; }
#tv .tv-rest { color: var(--amber); font-size: clamp(.9rem, 1.8vw, 1.3rem); }
@media (max-width: 700px) { #tv .tv-grid { grid-template-columns: 1fr; } }

/* spinners & busy states */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 17px; height: 17px; border-radius: 50%;
  border: 2.5px solid currentColor; border-top-color: transparent; opacity: .85;
  animation: spin .7s linear infinite; vertical-align: -3px; margin-right: 7px;
}
.btn.is-busy { pointer-events: none; filter: brightness(.92); }
.splash-spin {
  width: 38px; height: 38px; border-radius: 50%; margin: 0 auto 18px;
  border: 3px solid rgba(205,245,69,.2); border-top-color: #cdf545;
  animation: spin .8s linear infinite;
}

/* help sheet */
.help-body p { margin: 9px 0; color: var(--txt-dim); font-size: .92rem; line-height: 1.55; }
.help-body b { color: var(--txt); }

/* ============ footer ============ */
.footer {
  text-align: center; padding: 30px 16px 38px; color: var(--txt-faint); font-size: .82rem;
  display: flex; flex-direction: column; gap: 6px; align-items: center; margin-top: auto;
}
.footer .heart { color: var(--lime); }
.footer a {
  color: var(--txt-dim); text-decoration: none; font-weight: 700; letter-spacing: .04em;
  font-family: var(--disp); font-size: .95rem; text-transform: none;
  border: 1px solid var(--line); border-radius: 999px; padding: 6px 14px; background: var(--bg1);
  transition: all .15s;
}
.footer a:hover, .footer a:active { color: var(--lime); border-color: rgba(205,245,69,.35); }
.screen > .footer { margin-top: 0; }
</style>

<body>
<div id="js-warn" style="position:fixed;inset:0;z-index:999;background:#0b0e11;color:#e8edf2;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;font-family:-apple-system,sans-serif">
  <div style="max-width:34ch">
    <div class="splash-spin" style="width:38px;height:38px;border-radius:50%;margin:0 auto 18px;border:3px solid rgba(205,245,69,.2);border-top-color:#cdf545"></div>
    <b style="font-size:1.1rem">Loading Americano…</b><br><br>
    <span style="color:#97a4b0;font-size:.88rem;line-height:1.5">Stuck on this screen? Then this viewer can't run apps (WhatsApp and iOS Files previews can't). Open the file in <b>Safari or Chrome</b> instead.</span>
  </div>
</div>
<div id="app"></div>
<div id="toast"></div>

<script>
/*ENGINE-START*/
/**
 * Americano/Mexicano padel tournament engine. Pure logic, no DOM.
 * The tournament object `t` is plain JSON (safe for localStorage).
 */
const Engine = (() => {
  'use strict';

  const uid = () => 'p' + Math.random().toString(36).slice(2, 9);

  function defaultRng() { return Math.random(); }

  function shuffle(arr, rng) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ---------- creation ----------

  /** skill levels are relative to the group: 1 = weaker, 2 = middle, 3 = stronger */
  function clampSkill(v) { return v === 1 || v === 3 ? v : 2; }

  function createTournament(config) {
    const cfg = Object.assign({
      format: 'americano',          // 'americano' | 'mexicano'
      courts: 2,
      pointsPerMatch: 24,
      scoreEntry: 'combined',       // 'combined' | 'free'
      ranking: 'points',            // 'points' | 'wins'
      restPoints: 0,                // points granted per sit-out (0 = off)
      useSkills: false,             // balance Americano draws by player skill
      plannedRounds: 8,
      courtNames: [],
      name: 'Americano',
    }, config || {});

    // players: array of strings, or {name, skill} objects when skill levels are used
    const roster = (config && config.players || [])
      .map(p => (p && typeof p === 'object')
        ? { name: String(p.name || '').trim(), skill: clampSkill(p.skill) }
        : { name: String(p).trim(), skill: 2 })
      .filter(p => p.name);
    if (roster.length < 4) throw new Error('Need at least 4 players');
    if (cfg.pointsPerMatch < 2) throw new Error('Points per match must be at least 2');

    const t = {
      id: 't' + Date.now().toString(36),
      createdAt: config && config.createdAt || null,
      config: cfg,
      players: roster.map(p => ({ id: uid(), name: p.name, active: true, skill: p.skill })),
      rounds: [],
      finished: false,
    };
    return t;
  }

  // ---------- derived state ----------

  function activePlayers(t) { return t.players.filter(p => p.active); }

  function courtsUsed(t) {
    const n = activePlayers(t).length;
    return Math.max(1, Math.min(t.config.courts, Math.floor(n / 4)));
  }

  function pairKey(a, b) { return a < b ? a + '|' + b : b + '|' + a; }

  /** counts of partnered/opposed/rested derived from all generated rounds */
  function historyCounts(t) {
    const partner = {}, opponent = {}, rests = {}, games = {};
    for (const p of t.players) { rests[p.id] = 0; games[p.id] = 0; }
    for (const r of t.rounds) {
      for (const pid of r.resting) rests[pid] = (rests[pid] || 0) + 1;
      for (const m of r.matches) {
        const { teamA, teamB } = m;
        for (const pid of teamA.concat(teamB)) games[pid] = (games[pid] || 0) + 1;
        partner[pairKey(teamA[0], teamA[1])] = (partner[pairKey(teamA[0], teamA[1])] || 0) + 1;
        partner[pairKey(teamB[0], teamB[1])] = (partner[pairKey(teamB[0], teamB[1])] || 0) + 1;
        for (const a of teamA) for (const b of teamB) {
          opponent[pairKey(a, b)] = (opponent[pairKey(a, b)] || 0) + 1;
        }
      }
    }
    return { partner, opponent, rests, games };
  }

  // ---------- rest selection ----------

  function pickResters(t, rng) {
    const active = activePlayers(t);
    const cu = courtsUsed(t);
    const need = active.length - cu * 4;
    if (need <= 0) return [];

    const { rests, games } = historyCounts(t);
    const prev = t.rounds.length ? new Set(t.rounds[t.rounds.length - 1].resting) : new Set();

    // Hard-exclude last round's resters when enough other players remain.
    let pool = active.filter(p => !prev.has(p.id));
    if (pool.length < need) pool = active.slice();

    // Rest whoever has played the most. In a stable group this equals "fewest
    // rests first", but it also handles late joiners (0 games -> play, not rest).
    const jitter = new Map(pool.map(p => [p.id, rng()]));
    pool.sort((a, b) =>
      (games[b.id] - games[a.id]) ||
      (rests[a.id] - rests[b.id]) ||
      (jitter.get(a.id) - jitter.get(b.id)));
    return pool.slice(0, need).map(p => p.id);
  }

  // ---------- pairing (americano) ----------

  /** all ways to split an even-sized id array into unordered pairs */
  function enumerateMatchings(ids) {
    if (ids.length === 0) return [[]];
    const [first, ...rest] = ids;
    const out = [];
    for (let i = 0; i < rest.length; i++) {
      const pair = [first, rest[i]];
      const remaining = rest.filter((_, k) => k !== i);
      for (const sub of enumerateMatchings(remaining)) out.push([pair, ...sub]);
    }
    return out;
  }

  function pairingCost(pairs, matchups, counts) {
    let cost = 0;
    for (const [a, b] of pairs) {
      const c = counts.partner[pairKey(a, b)] || 0;
      cost += 100 * c * c;
    }
    for (const [pa, pb] of matchups) {
      for (const a of pa) for (const b of pb) {
        const c = counts.opponent[pairKey(a, b)] || 0;
        cost += c * c;
      }
    }
    if (counts.useSkills) {
      // Penalize lopsided matchups: compare team skill sums. A 1-step gap is
      // normal padel; bigger gaps (e.g. the two strongest vs the two weakest,
      // diff 4) cost more than a repeated partner, so they are avoided first.
      for (const [pa, pb] of matchups) {
        const diff = Math.abs(
          counts.skill[pa[0]] + counts.skill[pa[1]] -
          counts.skill[pb[0]] - counts.skill[pb[1]]);
        const over = Math.max(0, diff - 1);
        cost += 40 * over * over;
      }
    }
    return cost;
  }

  /** all ways to group `pairs` (array of 2*k pairs) into k matches of two pairs */
  function enumeratePairMatchups(pairs) {
    if (pairs.length === 0) return [[]];
    const [first, ...rest] = pairs;
    const out = [];
    for (let i = 0; i < rest.length; i++) {
      const matchup = [first, rest[i]];
      const remaining = rest.filter((_, k) => k !== i);
      for (const sub of enumeratePairMatchups(remaining)) out.push([matchup, ...sub]);
    }
    return out;
  }

  function bestAmericanoMatches(t, ids, rng) {
    const counts = historyCounts(t);
    counts.useSkills = !!t.config.useSkills;
    counts.skill = {};
    for (const p of t.players) counts.skill[p.id] = p.skill || 2;

    if (ids.length <= 12) {
      // Exhaustive: <= 10395 matchings x <= 15 groupings.
      let best = null, bestCost = Infinity, ties = [];
      for (const pairs of enumerateMatchings(shuffle(ids, rng))) {
        for (const matchups of enumeratePairMatchups(pairs)) {
          const cost = pairingCost(pairs, matchups, counts);
          if (cost < bestCost) { bestCost = cost; ties = [matchups]; }
          else if (cost === bestCost) ties.push(matchups);
        }
      }
      best = ties[Math.floor(rng() * ties.length)];
      return best;
    }

    // Heuristic for very large courts-per-round: random restarts + swap hill climbing.
    // Early-exits on a perfect (zero-repeat) draw so big groups stay fast.
    let best = null, bestCost = Infinity;
    for (let iter = 0; iter < 40 && bestCost > 0; iter++) {
      const order = shuffle(ids, rng);
      const pairs = [];
      for (let i = 0; i < order.length; i += 2) pairs.push([order[i], order[i + 1]]);
      const matchups = [];
      for (let i = 0; i < pairs.length; i += 2) matchups.push([pairs[i], pairs[i + 1]]);
      let cost = pairingCost(pairs, matchups, counts);
      let improved = true;
      while (improved) {
        improved = false;
        const flat = matchups.flat(2); // player ids in position order
        for (let i = 0; i < flat.length; i++) {
          for (let j = i + 1; j < flat.length; j++) {
            [flat[i], flat[j]] = [flat[j], flat[i]];
            const cand = [];
            for (let k = 0; k < flat.length; k += 4) {
              cand.push([[flat[k], flat[k + 1]], [flat[k + 2], flat[k + 3]]]);
            }
            const cPairs = cand.flatMap(m => m);
            const cCost = pairingCost(cPairs, cand, counts);
            if (cCost < cost) { cost = cCost; improved = true; }
            else [flat[i], flat[j]] = [flat[j], flat[i]];
          }
        }
        if (improved) {
          const rebuilt = [];
          for (let k = 0; k < flat.length; k += 4) {
            rebuilt.push([[flat[k], flat[k + 1]], [flat[k + 2], flat[k + 3]]]);
          }
          matchups.length = 0;
          matchups.push(...rebuilt);
        }
      }
      if (cost < bestCost) { bestCost = cost; best = matchups.map(m => [m[0].slice(), m[1].slice()]); }
    }
    return best;
  }

  // ---------- pairing (mexicano) ----------

  function mexicanoMatches(t, ids) {
    // Sort the active (non-resting) players by current standings; group 4 per court:
    // within each group, 1st+4th vs 2nd+3rd.
    const rank = standings(t).map(s => s.player.id);
    const pos = new Map(rank.map((id, i) => [id, i]));
    const sorted = ids.slice().sort((a, b) => pos.get(a) - pos.get(b));
    const matchups = [];
    for (let i = 0; i < sorted.length; i += 4) {
      const g = sorted.slice(i, i + 4);
      matchups.push([[g[0], g[3]], [g[1], g[2]]]);
    }
    return matchups;
  }

  // ---------- round generation ----------

  function anyScores(round) {
    return round.matches.some(m => m.scoreA !== null || m.scoreB !== null);
  }

  function generateRound(t, rng) {
    rng = rng || defaultRng;
    if (activePlayers(t).length < 4) throw new Error('Need at least 4 active players');

    const resting = pickResters(t, rng);
    const restSet = new Set(resting);
    const ids = shuffle(activePlayers(t).filter(p => !restSet.has(p.id)).map(p => p.id), rng);

    const useMexicano = t.config.format === 'mexicano' && t.rounds.some(anyScores);
    const matchups = useMexicano ? mexicanoMatches(t, ids) : bestAmericanoMatches(t, ids, rng);

    const round = {
      matches: matchups.map((m, i) => ({
        court: i,
        teamA: m[0], teamB: m[1],
        scoreA: null, scoreB: null,
      })),
      resting,
    };
    t.rounds.push(round);
    return round;
  }

  /** Re-draw a round. Only allowed on the last round and only when unscored. */
  function regenerateRound(t, idx, rng) {
    if (idx !== t.rounds.length - 1) throw new Error('Can only regenerate the last round');
    if (anyScores(t.rounds[idx])) throw new Error('Cannot regenerate a round with scores');
    t.rounds.pop();
    return generateRound(t, rng);
  }

  // ---------- scoring ----------

  function setScore(t, roundIdx, matchIdx, scoreA, scoreB) {
    const m = t.rounds[roundIdx].matches[matchIdx];
    const a = Number(scoreA), b = Number(scoreB);
    if (!Number.isInteger(a) || !Number.isInteger(b) || a < 0 || b < 0) {
      throw new Error('Scores must be non-negative whole numbers');
    }
    if (t.config.scoreEntry === 'combined' && a + b !== t.config.pointsPerMatch) {
      throw new Error('Scores must add up to ' + t.config.pointsPerMatch);
    }
    m.scoreA = a;
    m.scoreB = b;
  }

  function clearScore(t, roundIdx, matchIdx) {
    const m = t.rounds[roundIdx].matches[matchIdx];
    m.scoreA = null;
    m.scoreB = null;
  }

  function roundComplete(t, idx) {
    const r = t.rounds[idx];
    return r.matches.every(m => m.scoreA !== null && m.scoreB !== null);
  }

  // ---------- standings ----------

  function standings(t) {
    const stats = {};
    for (const p of t.players) {
      stats[p.id] = { player: p, points: 0, played: 0, wins: 0, draws: 0, losses: 0, pf: 0, pa: 0, diff: 0, rests: 0 };
    }
    for (const r of t.rounds) {
      for (const pid of r.resting) if (stats[pid]) stats[pid].rests++;
      for (const m of r.matches) {
        if (m.scoreA === null || m.scoreB === null) continue;
        const apply = (team, mine, theirs) => {
          for (const pid of team) {
            const s = stats[pid];
            if (!s) continue;
            s.points += mine;
            s.pf += mine;
            s.pa += theirs;
            s.played++;
            if (mine > theirs) s.wins++;
            else if (mine === theirs) s.draws++;
            else s.losses++;
          }
        };
        apply(m.teamA, m.scoreA, m.scoreB);
        apply(m.teamB, m.scoreB, m.scoreA);
      }
    }
    const rows = Object.values(stats);
    const restPts = t.config.restPoints || 0;
    for (const s of rows) {
      s.diff = s.pf - s.pa;
      s.points += s.rests * restPts;   // neutral sit-out compensation (optional)
    }
    const byPoints = (x, y) =>
      (y.points - x.points) || (y.diff - x.diff) || (y.wins - x.wins) ||
      x.player.name.localeCompare(y.player.name);
    const byWins = (x, y) =>
      (y.wins - x.wins) || (y.points - x.points) || (y.diff - x.diff) ||
      x.player.name.localeCompare(y.player.name);
    rows.sort(t.config.ranking === 'wins' ? byWins : byPoints);
    return rows;
  }

  // ---------- roster changes ----------

  function dropUnscoredTrailingRound(t, pid) {
    const last = t.rounds[t.rounds.length - 1];
    if (!last || anyScores(last)) return false;
    const involved = pid === undefined ||
      last.resting.includes(pid) ||
      last.matches.some(m => m.teamA.includes(pid) || m.teamB.includes(pid));
    if (involved) { t.rounds.pop(); return true; }
    return false;
  }

  /** Add a player mid-tournament. Returns the new player. */
  function addPlayer(t, name, rng, skill) {
    name = String(name).trim();
    if (!name) throw new Error('Name required');
    const p = { id: uid(), name, active: true, skill: clampSkill(skill) };
    t.players.push(p);
    if (dropUnscoredTrailingRound(t)) generateRound(t, rng);
    return p;
  }

  function setSkill(t, pid, skill) {
    const p = t.players.find(x => x.id === pid);
    if (!p) throw new Error('No such player');
    p.skill = clampSkill(skill);
  }

  /** Deactivate a player: kept in standings, excluded from future rounds. */
  function removePlayer(t, pid, rng) {
    const p = t.players.find(x => x.id === pid);
    if (!p) throw new Error('No such player');
    if (p.active && activePlayers(t).length <= 4) {
      throw new Error('Need at least 4 active players');
    }
    p.active = false;
    if (dropUnscoredTrailingRound(t, pid)) generateRound(t, rng);
  }

  /** Bring a removed player back: rejoins from the next draw. */
  function reactivatePlayer(t, pid, rng) {
    const p = t.players.find(x => x.id === pid);
    if (!p) throw new Error('No such player');
    p.active = true;
    if (dropUnscoredTrailingRound(t)) generateRound(t, rng);
  }

  function renamePlayer(t, pid, name) {
    name = String(name).trim();
    if (!name) throw new Error('Name required');
    const p = t.players.find(x => x.id === pid);
    if (!p) throw new Error('No such player');
    if (t.players.some(x => x.id !== pid && x.name.toLowerCase() === name.toLowerCase())) {
      throw new Error('Name already in use');
    }
    p.name = name;
  }

  /** Change court count mid-tournament; applies from the next draw. */
  function setCourts(t, n, rng) {
    n = Math.floor(Number(n));
    if (!(n >= 1 && n <= 6)) throw new Error('Courts must be 1-6');
    if (n === t.config.courts) return;
    t.config.courts = n;
    if (dropUnscoredTrailingRound(t)) generateRound(t, rng);
  }

  function playerName(t, pid) {
    const p = t.players.find(x => x.id === pid);
    return p ? p.name : '?';
  }

  return {
    createTournament, generateRound, regenerateRound, setScore, clearScore,
    roundComplete, standings, addPlayer, removePlayer, reactivatePlayer,
    renamePlayer, setCourts, setSkill, activePlayers,
    courtsUsed, historyCounts, playerName, anyScores,
  };
})();
/*ENGINE-END*/

/**
 * Show a spinner on a button, then run `fn` on the next beat. Draw generation is
 * synchronous, so without this the tap gives no feedback until the new DOM lands.
 * If `fn` bails without re-rendering (e.g. validation toast), the button restores itself.
 */
function busy(btn, label, fn) {
  if (!btn || btn.dataset.busy) return;
  const orig = btn.innerHTML;
  btn.dataset.busy = '1';
  btn.classList.add('is-busy');
  btn.innerHTML = `<span class="spinner"></span>${label}`;
  setTimeout(() => {
    try { fn(); } finally {
      if (document.contains(btn)) {
        btn.innerHTML = orig;
        btn.classList.remove('is-busy');
        delete btn.dataset.busy;
      }
    }
  }, 380);
}

function startTournament() {
  const s = setupState;
  const roster = s.players.map((n, i) => ({ name: n.trim(), skill: s.skills[i] || 2 })).filter(r => r.name);
  const names = roster.map(r => r.name);
  const lower = names.map(n => n.toLowerCase());
  if (new Set(lower).size !== lower.length) { toast('Player names must be unique', true); return; }
  mutate(() => {
    T = Engine.createTournament({
      players: s.useSkills ? roster : names,
      useSkills: s.useSkills,
      courts: s.courts,
      format: s.format,
      pointsPerMatch: s.pointsPerMatch,
      scoreEntry: s.scoreEntry,
      ranking: s.ranking,
      plannedRounds: s.plannedRounds || suggestedRounds(s),
      durationMin: s.durationMin,
      createdAt: Date.now(),
    });
    T.config.durationMin = s.durationMin;
    Engine.generateRound(T);
    store.saveLastPlayers(names, Object.fromEntries(roster.map(r => [r.name.toLowerCase(), r.skill])), s.useSkills);
    tab = 'rounds';
    viewRound = 0;
  });
}

function fmtClock(ms) {
  const neg = ms < 0;
  const totalS = Math.floor(Math.abs(ms) / 1000);
  const h = Math.floor(totalS / 3600);
  const body = h
    ? h + ':' + String(Math.floor(totalS / 60) % 60).padStart(2, '0')        // 1:56 (h:mm)
    : Math.floor(totalS / 60) + ':' + String(totalS % 60).padStart(2, '0');  // 43:12 (mm:ss)
  return (neg ? '+' : '') + body;
}

function sessionEnd() { return T.createdAt + (T.config.durationMin || 120) * 60000; }

function timerText() {
  if (!T || !T.createdAt) return '';
  return fmtClock(sessionEnd() - Date.now());
}

function updateTimerChip() {
  const chip = $('#timer-chip');

  const txt = timerText();

  chip.innerHTML = '⏳ ' + txt.replace(':', `<span class="tick${blinkOff ? ' dim' : ''}">:</span>`);
  chip.classList.toggle('over', txt.startsWith('+'));

}

function startTimer() {

        <div class="round-dots">${dots.join('')}</div>
      </div>
      <button class="nav" id="rnav-next" ${isLast ? 'disabled' : ''}>›</button>
    </div>

    ${r.matches.map((m, mi) => {
      const scored = m.scoreA !== null;
      const aWin = scored && m.scoreA > m.scoreB, bWin = scored && m.scoreB > m.scoreA;
      return `
      <div class="court-card ${scored ? 'scored' : ''}" data-match="${mi}">
        <div class="court-head"><span class="cname">Court ${mi + 1}</span><span class="cname">${scored ? 'tap to edit' : 'tap to score'}</span></div>
        <div class="court-body">
          <div class="team">
            <span class="tp">${pname(m.teamA[0])}</span>
            <span class="tp">${pname(m.teamA[1])}</span>
          </div>
          <div class="vs-block">
            ${scored
              ? `<div class="vs-score"><span class="${aWin ? 'w' : ''}">${m.scoreA}</span><span class="dash">–</span><span class="${bWin ? 'w' : ''}">${m.scoreB}</span></div>`
              : '<div class="vs-empty">vs</div>'}
          </div>
          <div class="team right">
            <span class="tp">${pname(m.teamB[0])}</span>
            <span class="tp">${pname(m.teamB[1])}</span>
          </div>
        </div>
      </div>`;
    }).join('')}

    ${r.resting.length ? (() => {
      const restsSoFar = {};
      for (let i = 0; i <= viewRound; i++) for (const pid of T.rounds[i].resting) restsSoFar[pid] = (restsSoFar[pid] || 0) + 1;
      return `
    <div class="rest-row">
      <span class="rlabel">Sitting out</span>
      ${r.resting.map(pid => `<span class="chip">${pname(pid)}${restsSoFar[pid] > 1 ? ` <span style="color:var(--txt-faint)">×${restsSoFar[pid]}</span>` : ''}</span>`).join('')}
    </div>`;
    })() : ''}

    ${T.config.roundTimerMin ? roundTimerHTML(r) : ''}

    ${allPlannedDone ? `
    <div class="banner"><b>All ${T.rounds.length} rounds played!</b> Finish the tournament to crown the winner — or squeeze in another round.</div>` : ''}

    <div class="round-actions">
      ${isLast && complete && !allPlannedDone ? `<button class="btn btn-primary btn-block" id="next-round-btn" style="font-size:1.2rem;padding:16px">Draw round ${T.rounds.length + 1} →</button>` : ''}
      ${allPlannedDone ? `
        <button class="btn btn-primary btn-block" id="finish-btn" style="font-size:1.2rem;padding:16px">🏆 Finish &amp; crown winner</button>
        <button class="btn btn-ghost btn-block" id="extra-round-btn">+ One more round</button>` : ''}
      ${isLast && !Engine.anyScores(r) ? '<button class="btn btn-ghost btn-block" id="regen-btn">⟲ Re-draw this round</button>' : ''}
      <button class="btn btn-ghost btn-block" id="share-draws">📋 Copy round draws</button>
    </div>`;

  $('#rnav-prev').addEventListener('click', () => { viewRound--; render(); });
  $('#rnav-next').addEventListener('click', () => { viewRound++; render(); });
  c.querySelectorAll('[data-match]').forEach(el => el.addEventListener('click', () => openScoreSheet(viewRound, +el.dataset.match)));
  const nb = $('#next-round-btn');
  if (nb) nb.addEventListener('click', () => busy(nb, 'Drawing…', () =>
    mutate(() => { Engine.generateRound(T); viewRound = T.rounds.length - 1; })));
  const eb = $('#extra-round-btn');
  if (eb) eb.addEventListener('click', () => busy(eb, 'Drawing…', () =>
    mutate(() => { T.config.plannedRounds = T.rounds.length + 1; Engine.generateRound(T); viewRound = T.rounds.length - 1; })));
  const rb = $('#regen-btn');
  if (rb) rb.addEventListener('click', () => busy(rb, 'Re-drawing…', () =>
    mutate(() => { Engine.regenerateRound(T, viewRound); })));
  const fb = $('#finish-btn');
  if (fb) fb.addEventListener('click', finishTournament);
  $('#share-draws').addEventListener('click', copyRoundDraws);
  wireRoundTimer(r);
}

/* ---------------- round timer ---------------- */

let roundTickInt = null;

function fmtMMSS(ms) {
  const s = Math.max(0, Math.round(ms / 1000));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function roundTimerLeft(r) {
  if (!r.timer) return T.config.roundTimerMin * 60000;
  if (r.timer.endsAt) return r.timer.endsAt - Date.now();
  return r.timer.left;
}

function roundTimerHTML(r) {
  const left = roundTimerLeft(r);
  const running = !!(r.timer && r.timer.endsAt);
  return `
    <div class="rtimer ${left <= 0 ? 'done' : ''}" id="rtimer">
      <span class="t" id="rtimer-t">${left <= 0 ? 'TIME!' : fmtMMSS(left)}</span>
      ${r.timer ? '<button class="btn btn-ghost" id="rtimer-reset">⟲</button>' : ''}
      <button class="btn btn-ghost" id="rtimer-toggle">${running ? 'Pause' : (r.timer ? 'Resume' : 'Start')}</button>
    </div>`;
}

function wireRoundTimer(r) {
  clearInterval(roundTickInt);
  const tgl = $('#rtimer-toggle');
  if (!tgl) return;
  tgl.addEventListener('click', () => {
    if (r.timer && r.timer.endsAt) r.timer = { left: Math.max(0, r.timer.endsAt - Date.now()) };
    else r.timer = { endsAt: Date.now() + Math.max(0, roundTimerLeft(r)) };
    store.saveCurrent(T);
    render();
  });
  const rst = $('#rtimer-reset');
  if (rst) rst.addEventListener('click', () => { delete r.timer; store.saveCurrent(T); render(); });
  if (r.timer && r.timer.endsAt) {
    roundTickInt = setInterval(() => {
      const el = $('#rtimer-t');
      if (!el) { clearInterval(roundTickInt); return; }
      const left = r.timer && r.timer.endsAt ? r.timer.endsAt - Date.now() : 0;
      el.textContent = left <= 0 ? 'TIME!' : fmtMMSS(left);
      if (left <= 0) { $('#rtimer').classList.add('done'); clearInterval(roundTickInt); }
    }, 500);
  }
}

/* ---------------- standings tab ---------------- */

function prevStandingsRanks() {
  // ranks before the latest round that has any scores (for movement arrows)
  const lastScored = [...T.rounds].reverse().find(r => Engine.anyScores(r));
  if (!lastScored) return null;
  const clone = JSON.parse(JSON.stringify(T));
  const idx = T.rounds.indexOf(lastScored);
  for (const m of clone.rounds[idx].matches) { m.scoreA = null; m.scoreB = null; }
  const ranks = {};
  Engine.standings(clone).forEach((s, i) => { ranks[s.player.id] = i; });
  return ranks;
}

function renderStandingsTab() {
  const c = $('#pane-standings');
  const st = Engine.standings(T);
  const prev = prevStandingsRanks();
  const maxPts = Math.max(1, ...st.map(s => s.points));
  const hasRests = T.rounds.some(r => r.resting.length);

  c.innerHTML = `
    <div class="pane-title">Standings</div>
    <table class="stand-table">
      <thead><tr>
        <th></th><th>Player</th><th>Pts</th><th>±</th><th>W·D·L</th>${hasRests ? '<th>Rest</th>' : ''}
      </tr></thead>
      <tbody>
        ${st.map((s, i) => {
          let mov = '';
          if (prev && s.played > 0) {
            const d = (prev[s.player.id] ?? i) - i;
            mov = d > 0 ? '<span class="mov up">▲</span>' : d < 0 ? '<span class="mov dn">▼</span>' : '<span class="mov">·</span>';
          }
          return `
          <tr class="top${i + 1}">
            <td class="rank">${i + 1}</td>
            <td class="pname">${esc(s.player.name)}${s.player.active ? '' : ' <span class="out">(left)</span>'}
              <div class="ptbar"><i style="width:${Math.round(100 * s.points / maxPts)}%"></i></div>
            </td>
            <td class="pts">${s.points}</td>
            <td style="color:${s.diff > 0 ? 'var(--lime)' : s.diff < 0 ? 'var(--red)' : 'var(--txt-faint)'}">${s.diff > 0 ? '+' : ''}${s.diff}</td>
            <td style="color:var(--txt-dim)">${mov}${s.wins}·${s.draws}·${s.losses}</td>
            ${hasRests ? `<td style="color:var(--txt-faint)">${s.rests}</td>` : ''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="setup-note" style="margin-top:14px">Ranked by ${T.config.ranking === 'wins' ? '<b>wins</b>, then points' : '<b>total points</b>'}, then point difference. ${T.config.restPoints
      ? `Sitting out earns <b>+${T.config.restPoints} pts</b> (set in Settings).`
      : 'Sitting out earns nothing — the draw keeps everyone’s games even (±1).'} Tap a match card to enter scores.</div>`;
}

/* ---------------- score sheet ---------------- */

function openScoreSheet(r, mi) {
  const m = T.rounds[r].matches[mi];
  const N = T.config.pointsPerMatch;
  const combined = T.config.scoreEntry === 'combined';
  scoreCtx = {
    r, mi,
    a: m.scoreA !== null ? m.scoreA : (combined ? Math.floor(N / 2) : 0),
    b: m.scoreB !== null ? m.scoreB : (combined ? Math.ceil(N / 2) : 0),
    existing: m.scoreA !== null,
  };
  renderScoreSheet();
}

function renderScoreSheet() {
  const { r, mi, a, b } = scoreCtx;
  const m = T.rounds[r].matches[mi];
  const N = T.config.pointsPerMatch;
  const combined = T.config.scoreEntry === 'combined';

  let ov = $('#score-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'score-overlay';
    ov.className = 'overlay';
    document.body.appendChild(ov);
  }
  ov.classList.add('open');
  sheetKeyboardAssist(ov);
  syncBodyLock();
  ov.innerHTML = `
    <div class="ovspace"></div>
    <div class="sheet">
      <div class="grab"></div>
      <h3>Round ${r + 1} · Court ${mi + 1}</h3>
      <div class="sub">${combined ? `Points add up to ${N} — set one side, the other follows.` : 'Enter both team scores.'}</div>
      <div class="score-grid">
        <div class="score-team ${a > b ? 'winning' : ''}" id="st-a">
          <div class="names">${pname(m.teamA[0])}<br>${pname(m.teamA[1])}</div>
          <input class="bignum" id="bn-a" type="number" inputmode="numeric" min="0" ${combined ? `max="${N}"` : ''} value="${a}">
          <div class="pmrow"><button data-t="a" data-d="-1">−</button><button data-t="a" data-d="1">+</button></div>
        </div>
        <div class="score-colon">:</div>
        <div class="score-team ${b > a ? 'winning' : ''}" id="st-b">
          <div class="names">${pname(m.teamB[0])}<br>${pname(m.teamB[1])}</div>
          <input class="bignum" id="bn-b" type="number" inputmode="numeric" min="0" ${combined ? `max="${N}"` : ''} value="${b}">
          <div class="pmrow"><button data-t="b" data-d="-1">−</button><button data-t="b" data-d="1">+</button></div>
        </div>
      </div>
      ${combined ? `<input type="range" class="score-slider" id="score-slider" min="0" max="${N}" step="1" value="${a}">` : ''}
      <div class="sheet-actions">
        ${scoreCtx.existing ? '<button class="btn btn-danger" id="score-clear">Clear</button>' : '<button class="btn btn-ghost" id="score-cancel">Cancel</button>'}
        <button class="btn btn-primary" id="score-save" style="flex:2">Save score</button>
      </div>
    </div>
    <div class="ovspace ovspace-b"></div>`;

  ov.querySelectorAll('.pmrow button').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const d = +btn.dataset.d, t = btn.dataset.t;
    if (combined) {
      // in combined mode the two sides are linked: +1 on one side is -1 on the other
      const na = Math.max(0, Math.min(N, t === 'a' ? scoreCtx.a + d : scoreCtx.a - d));
      scoreCtx.a = na;
      scoreCtx.b = N - na;
    } else if (t === 'a') scoreCtx.a = Math.max(0, scoreCtx.a + d);
    else scoreCtx.b = Math.max(0, scoreCtx.b + d);
    lightUpdate(); // in-place, same as the slider — no sheet re-render per press
  }));
  const bnA = $('#bn-a'), bnB = $('#bn-b');
  const slider = $('#score-slider');
  const sliderBg = () => {
    // track fills lime from the winning team's end up to the thumb
    // (thumb right => left side fills; thumb left => right side fills);
    // a faint center tick marks the draw point
    if (!slider) return;
    const lime = 'rgba(205,245,69,.6)', dim = 'rgba(46,56,66,1)', mark = 'rgba(232,237,242,.4)';
    const p = (scoreCtx.a / N) * 100;
    let stops;
    if (scoreCtx.a > scoreCtx.b) stops = `${lime} 0 ${p}%, ${dim} ${p}% 100%`;
    else if (scoreCtx.b > scoreCtx.a) stops = `${dim} 0 ${p}%, ${lime} ${p}% 100%`;
    else stops = `${dim} 0 100%`;
    slider.style.setProperty('--trk',
      `linear-gradient(90deg, transparent 0 calc(50% - 1.5px), ${mark} calc(50% - 1.5px) calc(50% + 1.5px), transparent calc(50% + 1.5px) 100%), linear-gradient(90deg, ${stops})`);
  };
  const lightUpdate = () => { // keep typing/drag smooth without a full re-render
    if (document.activeElement !== bnA) bnA.value = scoreCtx.a;
    if (document.activeElement !== bnB) bnB.value = scoreCtx.b;
    if (slider) slider.value = scoreCtx.a;
    sliderBg();
    ov.querySelector('#st-a').classList.toggle('winning', scoreCtx.a > scoreCtx.b);
    ov.querySelector('#st-b').classList.toggle('winning', scoreCtx.b > scoreCtx.a);
  };
  sliderBg(); // initial state (e.g. editing an existing score)
  if (slider) slider.addEventListener('input', e => {
    scoreCtx.a = +e.target.value; scoreCtx.b = N - scoreCtx.a;
    lightUpdate();
  });
  [bnA, bnB].forEach(inp => {
    inp.addEventListener('focus', () => inp.select());
    inp.addEventListener('input', () => {
      let v = parseInt(inp.value, 10);
      if (isNaN(v) || v < 0) return; // wait until the field holds a valid number
      if (combined) {
        v = Math.min(v, N);
        if (v !== parseInt(inp.value, 10)) inp.value = v;
        scoreCtx.a = inp === bnA ? v : N - v;
        scoreCtx.b = N - scoreCtx.a;
      } else if (inp === bnA) scoreCtx.a = v;
      else scoreCtx.b = v;
      lightUpdate();
    });
    inp.addEventListener('blur', () => { inp.value = inp === bnA ? scoreCtx.a : scoreCtx.b; });
  });
  $('#score-save').addEventListener('click', () => {
    mutate(() => Engine.setScore(T, r, mi, scoreCtx.a, scoreCtx.b));
    closeScoreSheet();
  });
  const sc = $('#score-cancel');
  if (sc) sc.addEventListener('click', closeScoreSheet);
  const cl = $('#score-clear');
  if (cl) cl.addEventListener('click', () => { mutate(() => Engine.clearScore(T, r, mi)); closeScoreSheet(); });
  ov.addEventListener('click', e => {
    if (e.target === ov || e.target.classList.contains('ovspace')) closeScoreSheet();
  });
}

function closeScoreSheet() {
  const ov = $('#score-overlay');
  if (ov) { ov.classList.remove('open'); ov.innerHTML = ''; }
  scoreCtx = null;
  syncBodyLock();
}

/* ---------------- menu / sheets ---------------- */

let bodyLockY = 0;
function syncBodyLock() {
  const anyOpen = !!document.querySelector('.overlay.open');
  const locked = document.body.classList.contains('sheet-lock');
  if (anyOpen && !locked) {
    bodyLockY = window.scrollY;
    document.body.style.top = -bodyLockY + 'px';
    document.body.classList.add('sheet-lock');
  } else if (!anyOpen && locked) {
    document.body.classList.remove('sheet-lock');
    document.body.style.top = '';
    window.scrollTo(0, bodyLockY);
  }
}

/* when the on-screen keyboard opens for an input inside a sheet, bring it into view */
function sheetKeyboardAssist(ov) {
  if (ov.dataset.kbAssist) return;
  ov.dataset.kbAssist = '1';
  ov.addEventListener('focusin', e => {
    if (e.target.matches('input')) {
      setTimeout(() => e.target.scrollIntoView({ block: 'center', behavior: 'smooth' }), 300);
    }
  });
}

function sheet(html) {
  let ov = $('#gen-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'gen-overlay';
    ov.className = 'overlay';
    document.body.appendChild(ov);
  }
  ov.classList.add('open');
  ov.innerHTML = `<div class="ovspace"></div><div class="sheet">${html}</div><div class="ovspace ovspace-b"></div>`;
  ov.addEventListener('click', e => {
    if (e.target === ov || e.target.classList.contains('ovspace')) closeSheet();
  });
  sheetKeyboardAssist(ov);
  syncBodyLock();
  return ov;
}
function closeSheet() {
  const ov = $('#gen-overlay');
  if (ov) { ov.classList.remove('open'); ov.innerHTML = ''; }
  syncBodyLock();
}

      <p>${esc(body)}</p>
